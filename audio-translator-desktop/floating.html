<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtitles</title>
  <style>
    :root {
      --subtitle-font-size: 24px;
      --cyan-300: #67E8F9;
      --cyan-400: #22D3EE;
      --cyan-500: #06B6D4;
      --slate-900: #0F172A;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border-radius: 14px;
      padding: 14px 16px 16px;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: no-drag;
      -webkit-font-smoothing: antialiased;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
      -webkit-app-region: drag;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .header:hover { opacity: 1; }

    .title {
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .controls {
      display: flex;
      gap: 2px;
      -webkit-app-region: no-drag;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      -webkit-app-region: no-drag;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }
    .ctrl-btn.close-btn {
      font-size: 15px;
      padding: 4px 7px;
    }
    .ctrl-btn.close-btn:hover { color: #EF4444; }

    .subtitle-list {
      flex: 1;
      -webkit-app-region: no-drag;
      overflow-y: auto;
      padding: 4px 6px 0 0;
      scroll-behavior: smooth;
    }
    .subtitle-list::-webkit-scrollbar { width: 6px; }
    .subtitle-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
    }

    .subtitle-article {
      padding: 6px 2px 24px;
      color: var(--white);
      font-size: var(--subtitle-font-size);
      font-weight: 500;
      line-height: 1.65;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }

    .subtitle-segment { display: inline; }
    .subtitle-segment::after { content: " "; }

    .subtitle-current {
      color: var(--cyan-300);
      opacity: 0.92;
    }

    .placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-size: 15px;
      font-weight: 400;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Subtitles</div>
      <div class="controls">
        <button class="ctrl-btn" id="fontDownBtn">A-</button>
        <button class="ctrl-btn" id="fontUpBtn">A+</button>
        <button class="ctrl-btn" id="clearBtn">Clear</button>
        <button class="ctrl-btn close-btn" id="closeBtn">&times;</button>
      </div>
    </div>
    <div class="subtitle-list" id="subtitleList">
      <div class="placeholder">Waiting for translation...</div>
    </div>
  </div>

  <script src="floating.js"></script>
</body>
</html>
